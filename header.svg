<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes flicker {
        0%, 100% { opacity: 1; }
        92% { opacity: 1; }
        93% { opacity: 0.2; }
        94% { opacity: 1; }
        96% { opacity: 0.3; }
        97% { opacity: 1; }
      }
      @keyframes scanline {
        0% { transform: translateY(-200px); }
        100% { transform: translateY(200px); }
      }
      @keyframes cursor {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes typewriter {
        0% { width: 0; }
        100% { width: 340px; }
      }
      .title {
        font-family: 'Courier New', monospace;
        font-size: 14px;
        fill: #58a6ff;
        animation: flicker 8s infinite;
      }
      .subtitle {
        font-family: 'Courier New', monospace;
        font-size: 12px;
        fill: #484f58;
      }
      .line {
        stroke: #21262d;
        stroke-width: 1;
      }
      .cursor-block {
        fill: #58a6ff;
        animation: cursor 1.2s step-end infinite;
      }
      .prompt {
        font-family: 'Courier New', monospace;
        font-size: 13px;
        fill: #7ee787;
      }
      .command {
        font-family: 'Courier New', monospace;
        font-size: 13px;
        fill: #e6edf3;
      }
      .output {
        font-family: 'Courier New', monospace;
        font-size: 12px;
        fill: #8b949e;
      }
      .classified {
        font-family: 'Courier New', monospace;
        font-size: 11px;
        fill: #f85149;
        letter-spacing: 6px;
      }
      .border-glow {
        stroke: #58a6ff;
        stroke-width: 1;
        fill: none;
        opacity: 0.3;
      }
      .dot-active {
        fill: #7ee787;
      }
      .dot-idle {
        fill: #484f58;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="8" fill="#0d1117"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="798" height="198" rx="8" class="border-glow"/>

  <!-- Scanline effect -->
  <rect width="800" height="2" fill="#58a6ff" opacity="0.03">
    <animateTransform attributeName="transform" type="translate" values="0,-200;0,200" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Top bar -->
  <rect x="0" y="0" width="800" height="32" rx="8" fill="#161b22"/>
  <rect x="0" y="24" width="800" height="8" fill="#161b22"/>

  <!-- Window dots -->
  <circle cx="20" cy="16" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="38" cy="16" r="5" fill="#e3b341" opacity="0.8"/>
  <circle cx="56" cy="16" r="5" fill="#7ee787" opacity="0.8"/>

  <!-- Terminal title -->
  <text x="400" y="20" text-anchor="middle" class="subtitle">nerdly@void — zsh — 80×24</text>

  <!-- Line separator -->
  <line x1="0" y1="32" x2="800" y2="32" class="line"/>

  <!-- Prompt line 1 -->
  <text x="20" y="62" class="prompt">~</text>
  <text x="36" y="62" class="command">whoami</text>

  <!-- Output line 1 -->
  <text x="20" y="82" class="output">fullstack developer · 15+ years · building things for the web</text>

  <!-- Prompt line 2 -->
  <text x="20" y="112" class="prompt">~</text>
  <text x="36" y="112" class="command">cat /proc/status</text>

  <!-- Output line 2 -->
  <text x="20" y="132" class="classified">▓▓▓  CLASSIFIED  ▓▓▓</text>

  <!-- Status indicators -->
  <circle cx="20" cy="160" r="3" class="dot-active"/>
  <text x="30" y="164" class="output">active</text>

  <circle cx="100" cy="160" r="3" class="dot-idle"/>
  <text x="110" y="164" class="output">3 systems online</text>

  <circle cx="230" cy="160" r="3" class="dot-idle"/>
  <text x="240" y="164" class="output">uptime: 15y 3m 12d</text>

  <!-- Cursor -->
  <text x="20" y="186" class="prompt">~</text>
  <rect x="36" y="176" width="8" height="14" class="cursor-block"/>

</svg>
