<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes flicker {
        0%, 100% { opacity: 1; }
        92% { opacity: 1; }
        93% { opacity: 0.2; }
        94% { opacity: 1; }
        96% { opacity: 0.3; }
        97% { opacity: 1; }
      }
      @keyframes cursor {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .subtitle {
        font-family: 'Courier New', monospace;
        font-size: 12px;
        fill: #484f58;
      }
      .line {
        stroke: #21262d;
        stroke-width: 1;
      }
      .cursor-block {
        fill: #58a6ff;
        animation: cursor 1.2s step-end infinite;
      }
      .prompt {
        font-family: 'Courier New', monospace;
        font-size: 13px;
        fill: #7ee787;
      }
      .command {
        font-family: 'Courier New', monospace;
        font-size: 13px;
        fill: #e6edf3;
      }
      .output {
        font-family: 'Courier New', monospace;
        font-size: 12px;
        fill: #8b949e;
      }
      .output-bright {
        font-family: 'Courier New', monospace;
        font-size: 12px;
        fill: #e6edf3;
      }
      .classified {
        font-family: 'Courier New', monospace;
        font-size: 11px;
        fill: #f85149;
        letter-spacing: 6px;
      }
      .bar {
        font-family: 'Courier New', monospace;
        font-size: 12px;
        fill: #7ee787;
      }
      .confirmed {
        font-family: 'Courier New', monospace;
        font-size: 12px;
        fill: #58a6ff;
      }
      .dim {
        font-family: 'Courier New', monospace;
        font-size: 11px;
        fill: #484f58;
      }
      .border-glow {
        stroke: #58a6ff;
        stroke-width: 1;
        fill: none;
        opacity: 0.3;
      }
      .dot-active {
        fill: #7ee787;
      }
      .dot-idle {
        fill: #484f58;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="8" fill="#0d1117"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="798" height="398" rx="8" class="border-glow"/>

  <!-- Scanline effect -->
  <rect width="800" height="2" fill="#58a6ff" opacity="0.03">
    <animateTransform attributeName="transform" type="translate" values="0,-400;0,400" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Top bar -->
  <rect x="0" y="0" width="800" height="32" rx="8" fill="#161b22"/>
  <rect x="0" y="24" width="800" height="8" fill="#161b22"/>

  <!-- Window dots -->
  <circle cx="20" cy="16" r="5" fill="#f85149" opacity="0.8"/>
  <circle cx="38" cy="16" r="5" fill="#e3b341" opacity="0.8"/>
  <circle cx="56" cy="16" r="5" fill="#7ee787" opacity="0.8"/>

  <!-- Terminal title -->
  <text x="400" y="20" text-anchor="middle" class="subtitle">nerdly@void — zsh — 80×24</text>

  <!-- Line separator -->
  <line x1="0" y1="32" x2="800" y2="32" class="line"/>

  <!-- whoami -->
  <text x="20" y="62" class="prompt">~</text>
  <text x="36" y="62" class="command">whoami</text>
  <text x="20" y="82" class="output">fullstack developer · 15+ years · building things for the web</text>
  <text x="20" y="98" class="dim">some of them you've used. most of them you'll never know about.</text>

  <!-- cat /proc/status -->
  <text x="20" y="128" class="prompt">~</text>
  <text x="36" y="128" class="command">cat /proc/status</text>
  <text x="20" y="150" class="bar">[■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■■]</text>
  <text x="280" y="150" class="output-bright">ACTIVE</text>
  <text x="20" y="170" class="confirmed">[CONFIRMED]</text>
  <text x="120" y="170" class="output">£2m+ revenue generated for clients</text>
  <text x="20" y="188" class="confirmed">[CONFIRMED]</text>
  <text x="120" y="188" class="output">95% client retention rate</text>
  <text x="20" y="206" class="confirmed">[CONFIRMED]</text>
  <text x="120" y="206" class="output">Certified API Security Analyst</text>

  <!-- cat /proc/status classified -->
  <text x="20" y="236" class="prompt">~</text>
  <text x="36" y="236" class="command">cat /var/log/ops.log</text>
  <text x="20" y="258" class="classified">▓▓▓  CLASSIFIED  ▓▓▓</text>
  <text x="20" y="278" class="output">operating in undisclosed sectors</text>
  <text x="20" y="296" class="output">building systems that don't officially exist</text>

  <!-- separator -->
  <line x1="20" y1="316" x2="780" y2="316" class="line"/>

  <!-- last seen -->
  <text x="20" y="338" class="dim">last seen ··· building something you'll hear about later</text>

  <!-- Status indicators -->
  <circle cx="20" cy="365" r="3" class="dot-active"/>
  <text x="30" y="369" class="output">active</text>

  <circle cx="100" cy="365" r="3" class="dot-idle"/>
  <text x="110" y="369" class="output">1000+ systems online</text>

  <circle cx="240" cy="365" r="3" class="dot-idle"/>
  <text x="250" y="369" class="output">uptime: 15y 3m 12d</text>

  <!-- Cursor -->
  <text x="20" y="392" class="prompt">~</text>
  <rect x="36" y="382" width="8" height="14" class="cursor-block"/>

</svg>
